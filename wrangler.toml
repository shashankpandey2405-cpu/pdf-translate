# ============================================================
# PDFTrusted — Cloudflare Worker + Static Assets configuration
# ============================================================
# Single Worker that:
#   - serves /api/* via Hono (worker/index.ts)
#   - falls through to the prebuilt Vite SPA (dist/) via the assets binding
#
# Local dev:    npx wrangler dev
# Deploy:       npm run build && npx wrangler deploy
# (This project bundles the Vite SPA + /api Worker together. A standalone
# `wrangler pages deploy ./dist` upload is not sufficient — it would omit the Hono API.)
# Secrets:      npx wrangler secret put <NAME>      (production)
#               edit .dev.vars                       (local; see .dev.vars.example)
# ============================================================

name = "pdftrusted"
main = "worker/index.ts"
compatibility_date = "2025-04-01"
# nodejs_compat is required for @aws-sdk/client-s3, bcryptjs, jose, and Node-style buffers.
compatibility_flags = ["nodejs_compat"]
# Account ID lifted from the prior Cloudflare R2 endpoint configured in .env.local.
# If you ever move the project to a different Cloudflare account, update this and the R2 bucket binding.
account_id = "ac66f6c1b4b25558539f13a11c70a58a"

# ------------------------------------------------------------
# Static assets (the built Vite SPA).
# `not_found_handling = "single-page-application"` makes the Worker serve dist/index.html
# for any non-asset path that doesn't match /api/* so client-side routing keeps working.
# ------------------------------------------------------------
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# ------------------------------------------------------------
# R2 binding — native access to the `pdftrusted` bucket from the Worker.
# Used for credential storage reads/writes (small JSON blobs).
# Large user uploads still go directly browser -> R2 via presigned S3-compat URLs.
# ------------------------------------------------------------
[[r2_buckets]]
binding = "PDFTRUSTED_R2"
bucket_name = "pdftrusted"

# ------------------------------------------------------------
# Non-secret runtime config (mirrors VITE_* / public defaults).
# Per-environment overrides go under [env.production.vars] / [env.preview.vars] below.
# Secrets (AUTH_GOOGLE_*, AUTH_SECRET, S3_*, RESEND_API_KEY, etc.) are NOT listed here —
# set them with `wrangler secret put NAME` for production, or in .dev.vars for local dev.
# ------------------------------------------------------------
[vars]
AUTH_TRUST_HOST = "true"
AUTH_SIGNIN_PATH = "/en/login"
AUTH_URL = "https://www.pdftrusted.com"
NEXTAUTH_URL = "https://www.pdftrusted.com"
AUTH_ONLY_MODE = ""              # leave empty to auto-detect from payment keys
PUBLIC_FREE_SUITE = "true"       # anonymous 20–50MB R2 staging + delete-staged without login
# Cloudflare S3-compatible endpoint for the `pdftrusted` bucket.
S3_ENDPOINT = "https://ac66f6c1b4b25558539f13a11c70a58a.r2.cloudflarestorage.com"
S3_REGION = "auto"
S3_BUCKET = "pdftrusted"
# Optional Neon/SQL — set in dashboard or `wrangler secret put` if you prefer not to commit values.
DATABASE_URL = ""
AUTH_SECRET = ""
AUTH_GOOGLE_ID = ""
AUTH_GOOGLE_SECRET = ""
# Vite client (set at `npm run build` / CI): optional overrides, e.g.
#   VITE_SHOW_AUTH_PREMIUM_UI=true   # login / pricing CTAs in the SPA
#   VITE_PDF_ENGINE=pdfjs           # force pdf.js instead of default MuPDF renderer
VITE_API_PROXY_TARGET = "https://www.pdftrusted.com"

# ------------------------------------------------------------
# Production env: same vars repeated so `wrangler deploy --env production` picks them up.
# Add or override here when prod differs from preview.
# ------------------------------------------------------------
[env.production]
[env.production.vars]
AUTH_TRUST_HOST = "true"
AUTH_SIGNIN_PATH = "/en/login"
AUTH_URL = "https://www.pdftrusted.com"
NEXTAUTH_URL = "https://www.pdftrusted.com"
S3_ENDPOINT = "https://ac66f6c1b4b25558539f13a11c70a58a.r2.cloudflarestorage.com"
S3_REGION = "auto"
S3_BUCKET = "pdftrusted"
VITE_API_PROXY_TARGET = "https://www.pdftrusted.com"
PUBLIC_FREE_SUITE = "true"

[[env.production.r2_buckets]]
binding = "PDFTRUSTED_R2"
bucket_name = "pdftrusted"

[env.production.triggers]
crons = ["0 4 * * *"]

# ------------------------------------------------------------
# Cron: purge orphaned `staging/` + `uploads/` objects older than 24h (see worker/lib/r2StagingCleanup.ts).
# Applies to default `wrangler deploy`; production env repeats the same schedule above.
# ------------------------------------------------------------
[triggers]
crons = ["0 4 * * *"]

# ------------------------------------------------------------
# Observability — keep request logs available for the first 24h.
# ------------------------------------------------------------
[observability]
enabled = true

# ------------------------------------------------------------
# Optional: bump these limits if needed (defaults are sane for the hobby plan).
# [limits]
# cpu_ms = 50
