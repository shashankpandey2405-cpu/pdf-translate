<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Offline — PDFTrusted</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1220;
      --surface: #111b2e;
      --text: #e2e8f0;
      --muted: #64748b;
      --primary: #6366f1;
      --primary-light: #818cf8;
      --radius: 1rem;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --surface: #f1f5f9;
        --text: #0f172a;
        --muted: #64748b;
      }
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      text-align: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: contain;
    }

    .container {
      max-width: 28rem;
      width: 100%;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      width: 5rem;
      height: 5rem;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.25rem;
      background: var(--surface);
      position: relative;
    }

    .icon-wrapper::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, var(--primary), transparent, var(--primary-light));
      opacity: 0.15;
      z-index: -1;
    }

    .logo {
      width: 3rem;
      height: 3rem;
      border-radius: 0.75rem;
    }

    .offline-icon {
      width: 3.5rem;
      height: 3.5rem;
      color: var(--muted);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .brand { color: var(--primary); }

    .description {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 0.875rem 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      touch-action: manipulation;
      transition: background 0.2s, transform 0.1s;
    }

    .retry-btn:hover { background: var(--primary-light); }
    .retry-btn:active { transform: scale(0.97); }

    .retry-icon {
      width: 1.125rem;
      height: 1.125rem;
      transition: transform 0.3s;
    }

    .retry-btn:active .retry-icon { transform: rotate(180deg); }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 1.75rem;
      border: 2px solid var(--primary);
      opacity: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0; transform: scale(0.95); }
      50% { opacity: 0.3; transform: scale(1.05); }
    }

    .status-dot {
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 0.375rem;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .online-toast {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      background: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .online-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="online-toast" class="online-toast">Back online — reloading...</div>

  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008z" />
        <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>

    <h1>You're offline</h1>
    <p class="description">
      <span class="status-dot"></span>No internet connection detected.<br>
      Check your connection and try again. Your files are safe — <span class="brand">PDFTrusted</span> processes everything in your browser.
    </p>

    <button class="retry-btn" onclick="location.reload()">
      <svg class="retry-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" />
      </svg>
      Try again
    </button>

    <p class="hint">The app will reload automatically when you're back online.</p>
  </div>

  <script>
    window.addEventListener("online", function () {
      var toast = document.getElementById("online-toast");
      if (toast) {
        toast.classList.add("show");
        setTimeout(function () { location.reload(); }, 1200);
      }
    });
  </script>
</body>
</html>
